<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$(TITLE)</title>

    <style>
        header {
            background-color: #252422;
        }

        .header-content a {
            color: #a89984;
            font-family: sans-serif;
        }

        body {
            background-color: #282724;
            color: #e9cd96;
        }

        article pre {
            scrollbar-color: #a89984;
            color: #f3cc62;
        }

        article p, article pre, article a, article li {
            margin-left: 20px;
        }

        article a {
            text-decoration: none;
            color: #fff7e6;
            font-weight: 600;
        }

        article a:visited {
            font-weight: 200;
        }

        article a::before, article li::before {
            content: "> ";
            display: block;
            height: 0;
            position: relative;
            right: 2ch;
            font-weight: 900;
        }

        article a::before {
            content: "> ";
            color: #458588;
        }

        article li::before {
            content: "* ";
            color: #f3cc62;
        }

        article li {
            list-style: none;
        }

        article a:visited {
            color: #b16286;
        }

        h1,h2,h3 {
          color: #fff7e6;
        }

        :root {
            font-size: 15px;
        }

        body,
        html {
            margin: 0;
            padding: 0;
        }

        ::selection {
            background: #d65d0e;
            color: #282828;
        }

        article {
            max-width: 70ch;
            padding: 30px;

            margin: auto;

            font-family: monospace;

            padding-top: 60px;
            padding-bottom: 200px;
        }

        article p,
        article li {
            line-height: 1.7rem;
            font-size: 1.1rem;
        }

        article ul {
            padding: 7px;
        }

        article h1 {
            font-size: 2rem;
            padding-bottom: 10px;
        }

        article h2 {
            font-size: 1.7rem;
        }

        article pre {
            font-size: 0.9rem;
            padding: 20px 0;
            overflow-x: auto;
        }

        article a {
            display: block;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        header {
            width: 100%;
            height: 80px;
        }

        .header-content {
            height: 40px;
            line-height: 40px;
            position: relative;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 70ch;
        }

        .icon {
            display: inline;
            image-rendering: crisp-edges;
        }

        .header-content a {
            font-size: 1.6rem;
            text-transform: uppercase;
            text-decoration: none;
            float: right;
        }

        body.js-disabled .header-content a {
            text-align: center;
            float: inherit;
            width: 100%;
            display: block;
        }

        @media screen and (max-width: 90ch) {
            .header-content {
                max-width: calc(70ch - 250px);
            }
        }

        small {
          opacity: 0.3;
          position: relative;
          top: 100px;
        }
    </style>
</head>

<body class="js-disabled">
    <header>
        <div class="header-content">
            <a href="$(ROOT)">$(NAME)</a>
        </div>
    </header>

    <article>
        $(CONTENT)

        <center>
          <small>Last modified at $(MTIME) on $(MDATE)</small>
        </center>
    </article>

    <script>
        const darkColours = [
            "#fb4934",
            "#b8bb26",
            "#fabd2f",
            "#83a598",
            "#d3869b",
            "#8ec07c",
            "#d65d0e",
        ];
        const darkBg = "#252422";

        const size = 40;
        const cells = 5;

        function hashString(str) {
            let hash = 2166136261;
            for (let i = 0; i < str.length; i++) {
                hash ^= str.charCodeAt(i);
                hash = Math.imul(hash, 16777619);
            }
            return hash >>> 0;
        }

        function mulberry32(a) {
            return function () {
                a |= 0;
                a = a + 0x6D2B79F5 | 0;
                let t = Math.imul(a ^ a >>> 15, 1 | a);
                t ^= t + Math.imul(t ^ t >>> 7, 61 | t);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        function createIdenticon(bg, colours, seed) {
            const seedHash = hashString(seed);
            const rand = mulberry32(seedHash);

            const canvas = document.createElement("canvas");
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext("2d");

            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, size, size);

            const cellSize = size / cells;
            const half = Math.ceil(cells / 2);

            const columnColors = Array.from({ length: half }, () =>
                colours[Math.floor(rand() * colours.length)]
            );

            for (let y = 0; y < cells; y++) {
                for (let x = 0; x < half; x++) {
                    if (rand() > 0.5) {
                        const mirrorX = cells - x - 1;

                        ctx.fillStyle = columnColors[x];

                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                        ctx.fillRect(mirrorX * cellSize, y * cellSize, cellSize, cellSize);
                    }
                }
            }

            return canvas;
        }

        function setFavicon(canvas) {
            const faviconURL = canvas.toDataURL('image/png');

            let link = document.querySelector("link[rel~='icon']");
            if (!link) {
                link = document.createElement('link');
                link.rel = 'icon';
                document.head.appendChild(link);
            }

            link.href = faviconURL;
        }

        function drawIdenticon(bg, colours) {
            const existingIdenticon = document.querySelector(".icon");
            if (existingIdenticon) {
                existingIdenticon.remove();
            }

            const hostnameFull = `${location.hostname}:${location.port}`;
            const identicon = createIdenticon(bg, colours, hostnameFull);
            identicon.classList.add("icon");
            const iconContainer = document.querySelector(".header-content");
            document.body.classList.remove("js-disabled");
            iconContainer.insertAdjacentElement("afterbegin", identicon);

            setFavicon(identicon);
        }

        drawIdenticon(darkBg, darkColours);

        const header = document.querySelector("header");
        header.addEventListener("click", () => location.href = "$(ROOT)");
        header.style.cursor = "pointer";
    </script>
</body>

</html>
